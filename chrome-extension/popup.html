<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>YT RIPPER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-container">
      <!-- Header -->
      <header class="header">
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
          </svg>
          <span class="brand-name">YT RIPPER</span>
        </div>
        <button id="settings-toggle" class="icon-button" title="개발자 설정">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </header>

      <!-- Advanced Settings (hidden by default) -->
      <section id="settings-panel" class="settings-panel hidden">
        <label for="backend-url">서버 설정 (로컬 개발용)</label>
        <div class="settings-row">
          <input id="backend-url" type="url" placeholder="https://youtube-downloader-8kya.onrender.com" />
          <button id="save" type="button">저장</button>
        </div>
        <p id="save-status" class="save-status"></p>
      </section>

      <!-- Server Status & Stats -->
      <section class="server-status-bar">
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span id="server-status-text">연결 확인 중...</span>
        </div>
        <div id="stats-total" class="stats-total">총 다운로드: 0곡</div>
      </section>

      <!-- Recent History List -->
      <section class="history-section">
        <h2>최근 다운로드한 음원</h2>
        <div id="history-list" class="history-list">
          <div class="empty-history">
            다운로드한 내역이 없습니다.
          </div>
        </div>
      </section>

      <!-- Guide Footer -->
      <footer class="footer-tips">
        <p>💡 유튜브 영상 아래의 <strong>[음원 다운로드]</strong> 버튼을 누르면 다운로드 폴더로 바로 저장됩니다.</p>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
